name: Auto Blog Update🐣

on:
  schedule:
    # 毎日日本時間 21:00 (UTC 12:00) に自動実行
    - cron: '0 12 * * *'
  workflow_dispatch: # ボタン一つで手動実行も可能

jobs:
  update-blog:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 記事を保存（Push）するために必要

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Auto Blogger
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python auto_blogger.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "Chunchun-Actions-Bot🐣"
          git config --global user.email "actions@github.com"
          git add posts.json index.html images/
          git diff --quiet && git diff --staged --quiet || (git commit -m "毎日更新：ちゅんちゅんが新しいネタを書き上げました！🐣✨" && git push)
